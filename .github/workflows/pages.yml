name: Deploy dashboard to GitHub Pages

# Static single-file PWA — no build step. Publishes the frontend/ folder.
# Data is NOT here: the live monitor.json lives on the `data` branch, fetched
# client-side from raw.githubusercontent.com, so dashboard data updates never
# trigger a Pages rebuild.
on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend
      - id: deployment
        uses: actions/deploy-pages@v4
